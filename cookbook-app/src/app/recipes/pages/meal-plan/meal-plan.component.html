<section class="meal-plan container">
  <div class="controls card">
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Diet</mat-label>
        <mat-select [(ngModel)]="diet">
          <mat-option value="omnivore">Omnivore</mat-option>
          <mat-option value="pescetarian">Pescetarian</mat-option>
          <mat-option value="vegetarian">Vegetarian</mat-option>
          <mat-option value="vegan">Vegan</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Days</mat-label>
        <input matInput type="number" [(ngModel)]="days" min="1" max="14" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Meals / day</mat-label>
        <input matInput type="number" [(ngModel)]="mealsPerDay" min="1" max="5" />
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="generate()" [disabled]="loading">
        <mat-icon>refresh</mat-icon>
        Generate
      </button>
    </div>
    <div class="status" *ngIf="loading">Building plan…</div>
    <div class="status error" *ngIf="error">{{ error }}</div>
  </div>

  <div *ngIf="plan.length" class="plan-grid">
      <div class="day-card card" *ngFor="let day of plan; let d = index">
        <div class="day-header">Day {{ d + 1 }}</div>
      <div class="meal-row" *ngFor="let meal of day; let m = index">
        <div class="meal-meta" (click)="goToRecipe(meal.id)">
          <div class="meal-title">{{ meal.title }}</div>
          <div class="meal-tags">
            <span class="chip">{{ protein(meal) }}</span>
            <span class="chip" *ngFor="let t of meal.tags">{{ t }}</span>
          </div>
        </div>
        <button mat-stroked-button color="primary" (click)="swap(d, m)" [disabled]="loading">
          <mat-icon>swap_horiz</mat-icon>
          Swap
        </button>
      </div>
    </div>
  </div>
</section>
