<section class="recipes-container container">
  <app-search-bar
    [availableTags]="allTags.length ? allTags : derivedTags"
    [recipeTitles]="recipeTitles"
    (search)="handleSearch($event)">
  </app-search-bar>

  <div class="count-row" *ngIf="recipes.length">
    <span>{{ filteredRecipes.length }} recipes</span>
    <span class="spacer"></span>
    <mat-form-field *ngIf="isLoggedIn()" appearance="outline" class="sort-field">
      <mat-label>Sort</mat-label>
      <mat-select [value]="sortChoice" (selectionChange)="onSortChange($event.value)">
        <mat-option [value]="''">None</mat-option>
        <mat-option value="rating_desc">Top Rated</mat-option>
        <mat-option value="rating_asc">Lowest Rated</mat-option>
        <mat-option value="favorites_desc">Most Favorited</mat-option>
        <mat-option value="favorites_asc">Least Favorited</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="recipe-grid">
    <a class="recipe-card card" *ngFor="let recipe of filteredRecipes" [routerLink]="['/recipes', recipe.id]">
      <div class="media">
        <img [src]="recipe.image || placeholderImage" alt="{{ recipe.title }}" />
        <button *ngIf="isLoggedIn()" class="favorite-btn" mat-icon-button (click)="toggleFavorite($event, recipe)" aria-label="Favorite">
          <mat-icon color="warn">{{ recipe.is_favorited ? 'favorite' : 'favorite_border' }}</mat-icon>
        </button>
      </div>
      <div class="content">
        <h3 class="title">{{ recipe.title }}</h3>
        <div class="meta">
          <span *ngIf="recipe.cook_time">
            <mat-icon>timer</mat-icon> {{ minutes(recipe.cook_time) }} min
          </span>
          <span *ngIf="recipe.servings">
            <mat-icon>group</mat-icon> {{ recipe.servings }} servings
          </span>
          <span *ngIf="recipe.favorites_count != null">
            <mat-icon>favorite</mat-icon> {{ recipe.favorites_count || 0 }}
          </span>
        </div>
        <div class="tags" *ngIf="recipe.tags?.length">
          <span class="chip" *ngFor="let tag of recipe.tags">{{ tag }}</span>
        </div>
      </div>
    </a>
  </div>

  <div #anchor class="loading-anchor"></div>
</section>
