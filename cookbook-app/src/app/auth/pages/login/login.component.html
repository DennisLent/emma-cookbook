<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <div class="header-icon">
        <mat-icon>lock</mat-icon>
      </div>
      <mat-card-title>Welcome</mat-card-title>
      <mat-card-subtitle>Sign in with your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="login-form">
        <button mat-flat-button color="primary" class="full-width login-btn" (click)="login()">
          Login with SSO
        </button>
        <div class="register-link">
          <span>New user?</span>
          <a mat-button color="accent" href="#" (click)="$event.preventDefault(); login();">Register via SSO</a>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
