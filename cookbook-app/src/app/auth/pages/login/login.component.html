<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <div class="header-icon">
        <mat-icon>lock</mat-icon>
      </div>
      <mat-card-title>Welcome</mat-card-title>
      <mat-card-subtitle>Sign in with your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Keycloak SSO -->
      <ng-container *ngIf="provider === 'keycloak'; else jwtForm">
        <div class="login-form">
          <button mat-flat-button color="primary" class="full-width login-btn" (click)="login()">
            Login with SSO
          </button>
          <div class="register-link">
            <span>New user?</span>
            <a mat-button color="accent" href="#" (click)="$event.preventDefault(); login();">Register via SSO</a>
          </div>
        </div>
      </ng-container>

      <!-- JWT Form -->
      <ng-template #jwtForm>
        <form (ngSubmit)="login()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input matInput type="text" [(ngModel)]="username" name="username" required />
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password" name="password" required />
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix type="button" aria-label="Toggle password visibility" (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          <button mat-flat-button color="primary" class="full-width login-btn" type="submit">
            Login
          </button>

          <p *ngIf="error" class="error-msg">{{ error }}</p>

          <div class="register-link">
            <span>Don’t have an account?</span>
            <a mat-button color="accent" routerLink="/register">Register</a>
          </div>
        </form>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
