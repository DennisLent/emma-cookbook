<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header class="register-header">
      <div class="header-icon">
        <mat-icon>person_add</mat-icon>
      </div>
      <mat-card-title>Create an Account</mat-card-title>
      <mat-card-subtitle>
        <ng-container *ngIf="provider === 'keycloak'; else jwtSubtitle">Use Single Sign-On to join</ng-container>
        <ng-template #jwtSubtitle>Join us and start cooking!</ng-template>
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <ng-container *ngIf="provider === 'keycloak'; else jwtForm">
        <div class="register-form">
          <button mat-flat-button color="accent" class="full-width" (click)="register()">
            Continue with SSO
          </button>
        </div>
      </ng-container>

      <ng-template #jwtForm>
        <form #f="ngForm" class="register-form" (ngSubmit)="register()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input matInput name="username" [(ngModel)]="form.username" required minlength="3" />
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" name="password" [(ngModel)]="form.password" required minlength="6" />
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix type="button" aria-label="Toggle password visibility" (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" name="password2" [(ngModel)]="form.password2" required minlength="6" />
            <mat-icon matPrefix>lock</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Bio (optional)</mat-label>
            <textarea matInput name="bio" [(ngModel)]="form.bio" rows="3" maxlength="200"></textarea>
            <mat-icon matPrefix>edit</mat-icon>
          </mat-form-field>

          <div class="avatar-upload">
            <input #avatarInput type="file" accept="image/*" hidden (change)="onFileSelected($event)" />
            <button mat-stroked-button color="primary" type="button" (click)="triggerAvatarInput()">
              <mat-icon>photo_camera</mat-icon>
              Upload Avatar
            </button>
            <span class="avatar-filename" *ngIf="form.avatar">{{ form.avatar.name }}</span>
          </div>

          <button mat-flat-button color="accent" class="full-width" [disabled]="f.invalid" type="submit">
            Register
          </button>

          <p *ngIf="error" class="error-msg">{{ error }}</p>
        </form>
      </ng-template>
    </mat-card-content>

    <mat-card-actions class="card-footer">
      <span>Already have an account?</span>
      <a mat-button color="primary" routerLink="/login">Login</a>
    </mat-card-actions>
  </mat-card>
</div>
