name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_ENGINE: sqlite
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r ../requirements.txt coverage
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run backend tests
        run: coverage run --source=cookbook,recipes,users manage.py test users.tests.test_tag_inference users.tests.test_app_version_api users.tests.test_app_update_api users.tests.test_change_password_api recipes.tests_contract
      - name: Build backend coverage report
        run: coverage xml -o coverage.xml
      - name: Upload backend coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  live-import-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_ENGINE: sqlite
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      RUN_LIVE_IMPORT_SMOKE_TESTS: "1"
      CELERY_TASK_ALWAYS_EAGER: "True"
      CELERY_TASK_EAGER_PROPAGATES: "False"
      VOSK_MODEL_PATH: /tmp/vosk-model-small-en-us-0.15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install OS packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip
      - name: Install backend dependencies
        run: pip install -r ../requirements.txt
      - name: Download Vosk model
        run: |
          curl -L -o /tmp/vosk-model-small-en-us-0.15.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip -q /tmp/vosk-model-small-en-us-0.15.zip -d /tmp
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run live import smoke tests
        run: python manage.py test recipes.tests_live_imports --verbosity 2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cookbook-app
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cookbook-app/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests with coverage
        run: npm run test:coverage
      - name: Upload frontend coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: cookbook-app/coverage/lcov.info,cookbook-app/coverage/cobertura-coverage.xml
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Build frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    defaults:
      run:
        working-directory: cookbook-app
    env:
      DATABASE_ENGINE: sqlite
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cookbook-app/package-lock.json
      - name: Install backend dependencies
        run: pip install -r ../requirements.txt
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: npm run test:e2e
